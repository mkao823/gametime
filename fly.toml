# Fly.io template for gametime predictions API.
# Rename `app` before first deploy: fly apps create <your-app-name>
app = "gametime-api"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  GAMETIME_ROOT = "/data"
  GAMETIME_CONFIG = "configs/mlb.yaml"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[mounts]]
  source = "gametime_data"
  destination = "/data"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
