# MLB pregame only — winner + total runs (no in-game live model)

sport: mlb

data:
  seasons: [2021, 2022, 2023, 2024, 2025, 2026]
  games_path: data/mlb/processed/games.parquet
  # M1 starting pitcher sidecar (MLB Stats API; 2024+). Run gametime-download to refresh.
  pitcher_games_path: data/mlb/processed/pitcher_games.parquet
  pitcher_min_season: 2024
  refresh_pitcher_games: false

train:
  model_dir: models/mlb/pregame
  train_seasontypes: [rg]
  train_seasons: [2021, 2022, 2023]
  val_season: 2024
  val_season_fallback: 2023
  val_seasontype: rg
  test_seasons: [2025]
  test_seasontype: rg

pregame:
  model_dir: models/mlb/pregame
  games_path: data/mlb/processed/games.parquet
  report_path: reports/mlb/eval/pregame_summary.json
  form_window: 10
  league_total_fallback: 8.5
  ensemble:
    enabled: true
    tune_weights: true
    use_stacking: false
    stack_alpha: 1.0
    export_predictions: true
    min_member_weight: 0.05
    grid_step: 0.05
    members: [lgbm, heuristic, runs_strength, poisson, pythagorean, pitcher, travel_rest, elo]
    runs_strength_window: 30
  elo:
    k: 4
    home_adv_runs: 0.15
    season_regression: 0.25
    margin_elo_scale: 50
